<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS CCTV Camera Monitoring – Nagar Parishad Sultanganj</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Leaflet CSS & Plugins -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Decorative Background Elements -->
    <div class="bg-blur-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Background SVG Pattern -->
    <div class="bg-pattern">
        <svg opacity="0.4" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="currentColor" stroke-width="0.5" />
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#grid)" />
        </svg>
    </div>

    <!-- Header Section -->
    <header class="navbar sticky-top p-0 shadow-sm custom-header">
        <div class="container-fluid d-flex align-items-center py-2 px-4">
            <div class="logo-box me-3">
                <div class="logo-placeholder premium-logo">
                    <!-- Modern Radar/GIS Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 2v20" />
                        <path d="M2 12h20" />
                        <path d="M12 12l8.5-8.5" />
                    </svg>
                </div>
            </div>
            <div class="d-flex flex-column">
                <div class="d-flex align-items-center gap-3">
                    <h1 class="navbar-brand fs-5 fw-extrabold mb-0">
                        <span class="gradient-text">Network Dashboard</span>
                    </h1>
                    <div class="badge pulse-badge d-none d-lg-flex align-items-center gap-2">
                        <span class="pulse-dot"></span> LIVE NETWORK
                    </div>
                </div>
                <span class="opacity-75 fw-500 mt-1 d-none d-md-block"
                    style="font-size: 0.85rem; color: var(--text-main);">
                    Live surveillance ecosystem for <span class="highlight-text" style="font-size: 0.85rem;">Nagar
                        Parishad Sultanganj</span>
                </span>
            </div>

            <div class="ms-auto d-flex align-items-center gap-4">
                <button type="button" class="btn btn-modern custom-reset-btn py-1 px-3 d-none d-md-block"
                    id="reset-filters" style="font-size: 0.85rem !important;">
                    <i class="fas fa-sync-alt me-1"></i> Reset View
                </button>
                <!-- Premium Theme Toggle -->
                <div class="theme-switch-container shadow-sm" id="theme-toggle-btn" title="Toggle Night Mode">
                    <div class="theme-switch-track">
                        <i class="fas fa-sun toggle-sun"></i>
                        <i class="fas fa-moon toggle-moon"></i>
                        <div class="switch-handle"></div>
                    </div>
                    <!-- Hidden checkbox for logic -->
                    <input type="checkbox" id="dark-mode-toggle" style="display:none;">
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Wrapper -->
    <div class="container main-wrapper pb-5">
        <!-- Dashboard Stat Cards & Analytics -->
        <div class="dashboard-stats-grid">
            <div class="stat-card total-card">
                <div class="card-body p-2">
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <div class="stat-icon-box">
                            <!-- CCTV Icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M16.75 12h3.632a1 1 0 0 1 .894 1.447l-2.034 4.069a1 1 0 0 1-1.708.135L16.75 12z" />
                                <path d="M14.5 19.5 12 12" />
                                <path d="M7 11V9a5 5 0 0 1 10 0v2" />
                                <circle cx="12" cy="12" r="2" />
                            </svg>
                        </div>
                        <span class="trend-badge positive">+2.5%</span>
                    </div>
                    <h6 class="card-subtitle mb-1">Total Network</h6>
                    <h2 class="custom-stat-number fw-extrabold mb-0" id="total-cameras-count">0</h2>
                </div>
            </div>
            <div class="stat-card active-card">
                <div class="card-body p-2">
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <div class="stat-icon-box">
                            <!-- CCTV Active Icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M16.75 12h3.632a1 1 0 0 1 .894 1.447l-2.034 4.069a1 1 0 0 1-1.708.135L16.75 12z" />
                                <path d="M14.5 19.5 12 12" />
                                <path d="M7 11V9a5 5 0 0 1 10 0v2" />
                                <circle cx="12" cy="12" r="2" />
                                <circle cx="19" cy="5" r="3" fill="currentColor" />
                            </svg>
                        </div>
                        <span class="status-dot-active">Online</span>
                    </div>
                    <h6 class="card-subtitle mb-1">CCTV Points</h6>
                    <h2 class="custom-stat-number fw-extrabold mb-0" id="active-cameras-count">0</h2>
                </div>
            </div>


            <div class="stat-card speaker-card">
                <div class="card-body p-2">
                    <div class="d-flex align-items-center justify-content-between mb-2">
                        <div class="stat-icon-box">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
                            </svg>
                        </div>
                        <span class="status-dot-active">PA Active</span>
                    </div>
                    <h6 class="card-subtitle mb-1">Horn Speakers</h6>
                    <h2 class="custom-stat-number fw-extrabold mb-0" id="total-speakers-count">42</h2>
                </div>
            </div>
            <div class="stat-card sos-card">
                <div class="card-body p-2">
                    <div class="d-flex align-items-center justify-content-between mb-2">
                        <div class="stat-icon-box">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                                <path d="M12 9v4" />
                                <path d="M12 17h.01" />
                            </svg>
                        </div>
                        <span class="status-dot-active">Ready</span>
                    </div>
                    <h6 class="card-subtitle mb-1">SOS System</h6>
                    <h2 class="custom-stat-number fw-extrabold mb-0" id="total-sos-count">12</h2>
                </div>
            </div>
        </div>

        <!-- Map & Sidebar Combined -->
        <div class="gis-container shadow-lg">
            <!-- Sidebar Camera List -->
            <aside class="camera-list-sidebar">
                <div class="sidebar-search-box">
                    <div class="input-group">
                        <span class="input-group-text border-end-0 text-muted" style="background: transparent;">
                            <i class="fas fa-search"></i>
                        </span>
                        <input type="text" id="search-location" class="form-control border-start-0"
                            placeholder="Find camera...">
                    </div>
                </div>
                <div class="camera-list-items" id="camera-items-list">
                    <!-- Camera items will be rendered here -->
                </div>
            </aside>

            <!-- Map Area -->
            <div class="flex-grow-1 position-relative">
                <!-- Layer Control & Overlay Filters -->
                <div class="map-overlay-controls d-flex flex-wrap gap-2">
                    <select id="filter-ward" class="shadow-sm">
                        <option value="">All Regions</option>
                    </select>
                    <select id="filter-status" class="shadow-sm">
                        <option value="">All Status</option>
                        <option value="Active">Active</option>
                        <option value="Inactive">Offline</option>
                        <option value="Maintenance">Fixing</option>
                    </select>
                </div>
                <div id="camera-map" style="width: 100%; height: 100%;"></div>
            </div>
        </div>
    </div>


    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <!-- Local scripts -->
    <script src="cameras.js"></script>
    <script src="script.js"></script>
</body>

</html>
