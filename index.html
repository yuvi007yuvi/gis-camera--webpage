<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS CCTV Camera Monitoring – Nagar Parishad Sultanganj</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Leaflet CSS & Plugins -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header Section -->
    <header class="navbar navbar-dark sticky-top p-0 shadow-sm">
        <div class="container-fluid d-flex align-items-center py-2 px-3">
            <div class="logo-box me-3">
                <div class="logo-placeholder rounded-circle d-flex align-items-center justify-content-center">
                    <i class="fas fa-shield-halved fa-lg"></i>
                </div>
            </div>
            <h1 class="navbar-brand fs-5 fw-bold mb-0">GIS CCTV MONITORING <span class="d-none d-sm-inline">–
                    SULTANGANJ</span></h1>

            <div class="ms-auto d-flex align-items-center gap-4">
                <!-- Premium Theme Toggle -->
                <div class="theme-switch-container shadow-sm" id="theme-toggle-btn" title="Toggle Night Mode">
                    <div class="theme-switch-track">
                        <i class="fas fa-sun toggle-sun"></i>
                        <i class="fas fa-moon toggle-moon"></i>
                        <div class="switch-handle"></div>
                    </div>
                    <!-- Hidden checkbox for logic -->
                    <input type="checkbox" id="dark-mode-toggle" style="display:none;">
                </div>

                <div class="navbar-nav d-none d-md-block border-start ps-4 border-secondary border-opacity-25">
                    <span class="text-white small fw-500 opacity-75">Nagar Parishad Sultanganj, Bihar</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Wrapper -->
    <div class="container main-wrapper pb-5">
        <div class="row mb-5 align-items-center">
            <div class="col-lg-6">
                <h2 class="display-6 fw-bold mb-1">Camera Dashboard</h2>
                <p class="text-muted mb-0">Real-time monitoring network for Nagar Parishad Sultanganj</p>
            </div>
            <div class="col-lg-6 text-lg-end mt-3 mt-lg-0">
                <button type="button" class="btn btn-modern btn-outline-dark me-2" id="reset-filters">
                    Reset View
                </button>
            </div>
        </div>

        <!-- Dashboard Stat Cards & Analytics -->
        <div class="dashboard-stats-grid text-center">
            <div class="stat-card">
                <div class="card-body p-3">
                    <h6 class="card-subtitle mb-1">Total Network</h6>
                    <h2 class="display-6 fw-bold mb-0" id="total-cameras-count">0</h2>
                </div>
            </div>
            <div class="stat-card">
                <div class="card-body p-3">
                    <h6 class="card-subtitle mb-1">Active Units</h6>
                    <h2 class="display-6 fw-bold mb-0 text-success" id="active-cameras-count">0</h2>
                </div>
            </div>
            <div class="stat-card">
                <div class="card-body p-3">
                    <h6 class="card-subtitle mb-1">Offline</h6>
                    <h2 class="display-6 fw-bold mb-0 text-danger" id="inactive-cameras-count">0</h2>
                </div>
            </div>
            <div class="stat-card">
                <div class="card-body p-3">
                    <h6 class="card-subtitle mb-1">Maintenance</h6>
                    <h2 class="display-6 fw-bold mb-0 text-warning" id="maintenance-cameras-count">0</h2>
                </div>
            </div>
            <div class="chart-stats-card shadow-sm d-flex flex-column align-items-center">
                <h6 class="card-subtitle mb-0">Live Status</h6>
                <div class="chart-container">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Map & Sidebar Combined -->
        <div class="gis-container shadow-lg">
            <!-- Sidebar Camera List -->
            <aside class="camera-list-sidebar">
                <div class="sidebar-search-box">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted">
                            <i class="fas fa-search"></i>
                        </span>
                        <input type="text" id="search-location" class="form-control border-start-0"
                            placeholder="Find camera...">
                    </div>
                </div>
                <div class="camera-list-items" id="camera-items-list">
                    <!-- Camera items will be rendered here -->
                </div>
            </aside>

            <!-- Map Area -->
            <div class="flex-grow-1 position-relative">
                <!-- Layer Control & Overlay Filters -->
                <div class="map-overlay-controls d-flex flex-wrap gap-2">
                    <select id="filter-ward" class="shadow-sm">
                        <option value="">All Regions</option>
                    </select>
                    <select id="filter-status" class="shadow-sm">
                        <option value="">All Status</option>
                        <option value="Active">Active</option>
                        <option value="Inactive">Offline</option>
                        <option value="Maintenance">Fixing</option>
                    </select>
                </div>
                <div id="camera-map" style="width: 100%; height: 100%;"></div>
            </div>
        </div>
    </div>


    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <!-- Local scripts -->
    <script src="cameras.js"></script>
    <script src="script.js"></script>
</body>

</html>
