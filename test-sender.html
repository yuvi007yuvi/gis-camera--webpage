<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Alert Simulator | Field Testing Unit</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --accent: #ef4444;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin: 0;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.08) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .test-card {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 3rem;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .unit-label {
            display: inline-block;
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        h1 {
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .form-label {
            display: block;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .form-select {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            padding: 1rem;
            font-weight: 600;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        .form-select:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2);
            color: white;
        }

        .sos-trigger-btn {
            width: 100%;
            padding: 1.25rem;
            border-radius: 20px;
            background: var(--accent);
            border: none;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(239, 68, 68, 0.3);
            cursor: pointer;
        }

        .sos-trigger-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 45px rgba(239, 68, 68, 0.4);
            background: #f87171;
        }

        .sos-trigger-btn:active {
            transform: scale(0.95);
        }

        .status-pill {
            margin-top: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 10px #22c55e;
        }

        .alert-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #22c55e;
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            transform: translateY(100px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .alert-toast.show {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="test-card">
        <div class="unit-label">FIELD EMULATOR | UNIT-01</div>
        <h1>SOS Signal Simulator</h1>
        <p>Use this page to test cross-tab emergency signal reception on the main dashboard.</p>

        <div class="mb-4 text-start">
            <label class="form-label">SELECT EMERGENCY POINT</label>
            <select id="camera-selector" class="form-select">
                <!-- Javascript will populate this -->
            </select>
        </div>

        <button id="send-sos" class="sos-trigger-btn">
            <i class="fas fa-satellite-dish"></i> BROADCAST SOS
        </button>

        <div class="status-pill">
            <span class="pulse-dot"></span> LINK ACTIVE: WAITING FOR BROADCAST
        </div>
    </div>

    <div id="toast" class="alert-toast">
        <i class="fas fa-check-circle me-2"></i> EMERGENCY BROADCAST SENT
    </div>

    <script src="cameras.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 0. Initialize Firebase (Real Backend)
            const firebaseConfig = {
                apiKey: "AIzaSyB_sJQwf56lmZoJf0ciO95KIgV8bE9NwVM",
                authDomain: "new786970.firebaseapp.com",
                projectId: "new786970",
                storageBucket: "new786970.firebasestorage.app",
                messagingSenderId: "605309375100",
                appId: "1:605309375100:web:6538d00718d0914d042ff9"
            };
            
            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();

            const selector = document.getElementById('camera-selector');
            const sendBtn = document.getElementById('send-sos');
            const toast = document.getElementById('toast');

            // Populate selector from cameras.js
            cameraData.forEach((cam, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = `${cam.name} (${cam.ward === 'N/A' ? 'General' : 'Ward ' + cam.ward})`;
                selector.appendChild(opt);
            });

            sendBtn.addEventListener('click', async () => {
                const selectedIdx = selector.value;
                const cam = cameraData[selectedIdx];
                const timestamp = Date.now();

                const payload = {
                    ...cam,
                    triggerTime: timestamp,
                    alertId: 'SOS-' + timestamp
                };

                try {
                    // Update Local fallback first
                    localStorage.setItem('sos_alert_trigger', JSON.stringify(payload));
                    
                    // 🚀 BROADCAST TO FIREBASE (REAL BACKEND)
                    await db.collection("sos_alerts").add(payload);
                    
                    // Visual feedback
                    toast.classList.add('show');
                    sendBtn.disabled = true;
                    sendBtn.style.opacity = '0.5';
                    
                    setTimeout(() => {
                        toast.classList.remove('show');
                        sendBtn.disabled = false;
                        sendBtn.style.opacity = '1';
                    }, 3000);
                } catch (error) {
                    console.error("Error sending SOS:", error);
                    alert("Failed to send SOS signal. Check console for details.");
                }
            });
        });
    </script>
</body>
</html>
